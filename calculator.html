<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Scientific Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .calculator{
        width:370px;
        background:#111827;
        padding:20px;
        border-radius:20px;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    .display{
        width:100%;
        height:80px;
        background:#0f172a;
        color:white;
        font-size:32px;
        border:none;
        border-radius:12px;
        text-align:right;
        padding:20px;
        margin-bottom:15px;
        overflow:auto;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(5,1fr);
        gap:10px;
    }

    button{
        height:60px;
        border:none;
        border-radius:12px;
        font-size:18px;
        cursor:pointer;
        transition:0.2s;
        background:#1e293b;
        color:white;
    }

    button:hover{
        transform:scale(1.05);
        background:#334155;
    }

    .operator{
        background:#2563eb;
    }

    .equal{
        background:#16a34a;
    }

    .clear{
        background:#dc2626;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button onclick="append('Math.sqrt(')">√</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('*')">×</button>
        <button onclick="append('**')">x²</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('-')">−</button>
        <button onclick="append('Math.PI')">π</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="operator" onclick="append('+')">+</button>
        <button onclick="append('Math.E')">e</button>

        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>
        <button onclick="append('Math.log10(')">log</button>
        <button onclick="append('Math.log(')">ln</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function deleteLast(){
        display.value = display.value.slice(0,-1);
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }
        catch{
            display.value = "Error";
        }
    }

    document.addEventListener("keydown",(e)=>{
        const allowed = "0123456789+-*/.%()";
        
        if(allowed.includes(e.key)){
            append(e.key);
        }
        else if(e.key === "Enter"){
            calculate();
        }
        else if(e.key === "Backspace"){
            deleteLast();
        }
    });
</script>

</body>
</html>
